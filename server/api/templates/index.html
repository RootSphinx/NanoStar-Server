{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoStar | 身份验证</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="glass-card">
        <div class="logo">NanoStar</div>
        
        <!-- 视图 1：主验证界面 -->
        <div id="view-verify" class="view-section active">
            <h2>安全验证</h2>
            <p>点击下方按钮核实您的位置以请求访问权限。</p>
            <button id="btn-verify" class="glow-on-hover">获取权限</button>
            <div id="loading-spinner" class="spinner hidden"></div>
            <p id="status-msg" class="status-text"></p>
        </div>

        <!-- 视图 2：验证成功与评论界面 -->
        <div id="view-comment" class="view-section hidden">
            <div class="success-icon">✓</div>
            <h2>验证通过</h2>
            <p>系统已记录您的位置，机主已收到通知。</p>

            <!-- 位置详情卡片 -->
            <div id="location-detail" class="location-detail" style="display:none">
                <div id="gps-warning" class="gps-warning" style="display:none">
                    ⚠️ 无GPS权限，当前位置基于IP网络定位，可能不准确
                </div>
                <div class="detail-row">
                    <span class="detail-label">📍 访客坐标</span>
                    <span id="lbl-visitor-coord" class="detail-value"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">🏠 访客地址</span>
                    <span id="lbl-visitor-addr" class="detail-value"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">📱 设备坐标</span>
                    <span id="lbl-device-coord" class="detail-value"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">🏢 设备地址</span>
                    <span id="lbl-device-addr" class="detail-value"></span>
                </div>
            </div>

            <div class="comment-box">
                <label for="visitor-comment">留个言吧（可选）：</label>
                <textarea id="visitor-comment" rows="3" placeholder="你是谁？找我什么事？"></textarea>
                <button id="btn-submit-comment" class="submit-btn">发送留言</button>
            </div>
        </div>

        <!-- 视图 3：全部完成界面 -->
        <div id="view-done" class="view-section hidden">
            <h2>🎉 留言已发送</h2>
            <p>感谢您的访问，您可以关闭此页面了。</p>
        </div>
    </div>

    <!-- 传入 Django 渲染的配置给 JS 使用 -->
    <script>
        const csrfToken = "{{ csrf_token }}";
        const ipApiConfig = {
            endpoint: "{{ ip_api_endpoint }}",
            key: "{{ ip_api_key }}"
        };
    </script>
    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
